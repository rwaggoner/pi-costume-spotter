# Dashboard CI: lint + type-checked production build.
name: ci-web

on:
  push:
    branches: [main, master]
    paths: ["web/**", ".github/workflows/ci-web.yml"]
  pull_request:
    paths: ["web/**", ".github/workflows/ci-web.yml"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build   # tsc -b && vite build — the type check is the test
